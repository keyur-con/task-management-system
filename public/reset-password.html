<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="reset-password-card">
      <h1>Reset Password</h1>
      <p class="reset-instruction">
        Choose a new password and confirm it to update your account.
      </p>
      <form class="reset-password-form" id="resetPasswordForm">
        <div class="form-group">
          <label for="password">New Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter new password"
            required
          />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            placeholder="Confirm new password"
            required
          />
        </div>

        <button class="submit-btn" type="submit">Reset Password</button>
      </form>
    </main>
    <script src="reset-password.js"></script>
  </body>
</html>
