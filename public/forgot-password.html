<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="forgot-password-card">
      <h1>Forgot Password?</h1>
      <p class="reset-instruction">
        Enter your email address and we'll send you an OTP to reset your password.
      </p>
      <form class="forgot-password-form" id="forgotPasswordForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            required
          />
        </div>

        <button class="submit-btn" type="submit">Send OTP</button>
      </form>

      <p class="footer-text">
        Remember your password? <a href="login.html">Log in</a>
      </p>

      <div class="divider">
        <span>or</span>
      </div>

      <p class="footer-text">
        Don't have an account? <a href="signup.html">Sign up</a>
      </p>
    </main>
    <script src="forgot-password.js"></script>
  </body>
</html>
